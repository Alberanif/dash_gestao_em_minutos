<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Painel IGT — Gestão em 4 Minutos</title>
<meta name="viewport" content="width=1440" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif&display=swap" rel="stylesheet" />
<style>
  :root {
    --c-primary: #3b93c3;
    --c-primary-dark: #2e7aa8;
    --c-primary-light: #ebf5fb;
    --c-bg: #f6f8fb;
    --c-surface: #ffffff;
    --c-border: #eaeef3;
    --c-border-strong: #dbe2ea;
    --c-text: #1e293b;
    --c-muted: #64748b;
    --c-faint: #94a3b8;
    --c-success: #16a34a;
    --c-success-soft: #d4f1de;
    --c-danger: #dc2626;
    --c-danger-soft: #fadcdc;
    --c-warning: #d97706;
    --c-warning-soft: #f7e3bb;
    --r-sm: 8px;
    --r-md: 10px;
    --r-lg: 14px;
    --shadow-card: 0 1px 2px rgba(15, 23, 42, .04);
    --shadow-pop: 0 12px 36px rgba(15, 23, 42, .14);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--c-bg);
    color: var(--c-text);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    font-size: 14px;
  }
  .num { font-variant-numeric: tabular-nums; letter-spacing: -0.015em; }
  .serif { font-family: 'Instrument Serif', Georgia, serif; font-weight: 400; letter-spacing: -0.01em; }

  /* shell */
  .app { display: flex; min-height: 100vh; }
  .sidebar {
    width: 220px; flex-shrink: 0;
    background: var(--c-surface);
    border-right: 1px solid var(--c-border);
    display: flex; flex-direction: column;
    position: sticky; top: 0; height: 100vh;
  }
  .brand { height: 56px; background: var(--c-primary); display: flex; align-items: center; gap: 12px; padding: 0 16px; }
  .brand img { width: 24px; height: 24px; }
  .brand span { color: white; font-weight: 600; font-size: 12px; letter-spacing: .12em; }
  .nav { flex: 1; overflow-y: auto; padding: 14px 0; display: flex; flex-direction: column; gap: 1px; }
  .nav a {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 16px 8px 14px;
    color: var(--c-muted); font-size: 13px; font-weight: 500;
    text-decoration: none; cursor: pointer;
    border-left: 2px solid transparent;
  }
  .nav a:hover { background: #f8fafc; color: var(--c-text); }
  .nav a.active { background: var(--c-primary-light); color: var(--c-primary); border-left-color: var(--c-primary); font-weight: 600; }
  .nav svg { width: 16px; height: 16px; flex-shrink: 0; }
  .footer { border-top: 1px solid var(--c-border); padding: 12px 16px; display: flex; align-items: center; gap: 8px; color: var(--c-muted); font-size: 12px; }
  .footer .who { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .main { flex: 1; min-width: 0; }

  /* page header */
  .header {
    background: var(--c-surface); border-bottom: 1px solid var(--c-border);
    padding: 22px 32px; display: flex; align-items: flex-end; gap: 18px;
  }
  .header h1 {
    margin: 0; font-size: 28px; font-weight: 400;
    font-family: 'Instrument Serif', Georgia, serif; letter-spacing: -0.01em;
    color: var(--c-text);
  }
  .header .sub { font-size: 13px; color: var(--c-muted); margin: 4px 0 0; }
  .header .left { flex: 1; min-width: 0; }
  .controls { display: flex; align-items: center; gap: 6px; }
  .ctrl {
    background: transparent; border: 1px solid var(--c-border);
    color: var(--c-muted);
    border-radius: 999px; padding: 5px 12px; font-size: 12px; font-weight: 500;
    cursor: pointer;
  }
  .ctrl:hover { border-color: var(--c-border-strong); color: var(--c-text); }
  .ctrl.active { background: var(--c-text); color: white; border-color: var(--c-text); }
  .date-range { font-size: 12px; color: var(--c-faint); padding: 0 6px; }

  /* pulse — minimal one-liner */
  .pulse {
    padding: 18px 32px 0;
    display: flex; align-items: baseline; gap: 14px;
  }
  .pulse-dot { width: 8px; height: 8px; border-radius: 999px; flex-shrink: 0; transform: translateY(-1px); }
  .pulse-dot.green { background: var(--c-success); }
  .pulse-dot.amber { background: var(--c-warning); }
  .pulse-dot.red   { background: var(--c-danger); animation: pulseDot 2s infinite; }
  @keyframes pulseDot { 0%,100% { box-shadow: 0 0 0 0 rgba(220,38,38,.4); } 50% { box-shadow: 0 0 0 4px rgba(220,38,38,0); } }
  .pulse-text { font-size: 14px; color: var(--c-text); }
  .pulse-text b { font-weight: 600; }
  .pulse-meta { color: var(--c-faint); font-size: 12px; margin-left: auto; }

  /* sections */
  .section { padding: 22px 32px 36px; display: flex; flex-direction: column; gap: 22px; }
  .group-title {
    display: flex; align-items: baseline; gap: 12px;
    margin: 6px 0 -8px;
  }
  .group-title h2 { margin: 0; font-size: 12px; font-weight: 600; color: var(--c-faint); text-transform: uppercase; letter-spacing: .08em; }
  .group-title .count { font-size: 12px; color: var(--c-faint); }

  .grid { display: grid; gap: 12px; }
  .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }

  /* KPI CARD — compact */
  .kpi {
    background: var(--c-surface);
    border: 1px solid var(--c-border);
    border-radius: var(--r-lg);
    padding: 16px 18px;
    display: flex; flex-direction: column; gap: 10px;
    cursor: pointer;
    transition: border-color 140ms, box-shadow 140ms, transform 140ms;
    position: relative;
    min-height: 116px;
  }
  .kpi:hover { border-color: var(--c-border-strong); box-shadow: 0 6px 20px rgba(15,23,42,.06); transform: translateY(-1px); }
  .kpi.green { border-left: 2px solid var(--c-success); }
  .kpi.amber { border-left: 2px solid var(--c-warning); }
  .kpi.red   { border-left: 2px solid var(--c-danger); }

  .kpi-head { display: flex; align-items: center; gap: 8px; }
  .kpi-icon {
    width: 22px; height: 22px; flex-shrink: 0; color: var(--c-faint);
    display: grid; place-items: center;
  }
  .kpi-icon > svg { width: 14px !important; height: 14px !important; flex-shrink: 0; }
  .kpi-icon.yt { color: #dc2626; }
  .kpi-icon.ig { color: #be185d; }
  .kpi-title { font-size: 12px; font-weight: 500; color: var(--c-muted); margin: 0; flex: 1; min-width: 0; }
  .kpi-status { width: 6px; height: 6px; border-radius: 999px; flex-shrink: 0; }
  .kpi-status.green { background: var(--c-success); }
  .kpi-status.amber { background: var(--c-warning); }
  .kpi-status.red   { background: var(--c-danger); }

  .kpi-value {
    font-family: 'Instrument Serif', Georgia, serif;
    font-size: 32px; line-height: 1;
    font-weight: 400;
    color: var(--c-text); letter-spacing: -0.01em;
  }
  .kpi-value .unit { font-size: 14px; font-family: 'Inter', sans-serif; color: var(--c-faint); margin-left: 4px; font-weight: 500; letter-spacing: 0; }

  .kpi-foot {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11px; color: var(--c-faint);
    margin-top: auto;
  }
  .delta { font-weight: 500; font-variant-numeric: tabular-nums; font-size: 11px; }
  .delta.up { color: var(--c-success); }
  .delta.down { color: var(--c-danger); }
  .delta.flat { color: var(--c-faint); }

  /* expand affordance */
  .kpi::after {
    content: "↗";
    position: absolute; top: 14px; right: 14px;
    font-size: 11px; color: var(--c-faint);
    opacity: 0; transition: opacity 120ms;
  }
  .kpi:hover::after { opacity: 1; }

  /* MODAL */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(15, 23, 42, .42);
    display: none; align-items: center; justify-content: center;
    z-index: 100; padding: 40px 20px;
    backdrop-filter: blur(2px);
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: white; border-radius: 16px;
    width: 100%; max-width: 720px;
    box-shadow: var(--shadow-pop);
    overflow: hidden;
    max-height: calc(100vh - 80px);
    display: flex; flex-direction: column;
  }
  .modal-head {
    padding: 22px 26px 18px;
    border-bottom: 1px solid var(--c-border);
    display: flex; align-items: flex-start; gap: 14px;
  }
  .modal-head h3 { margin: 0; font-family: 'Instrument Serif', Georgia, serif; font-size: 22px; font-weight: 400; line-height: 1.2; color: var(--c-text); letter-spacing: -0.01em; }
  .modal-head .sub { font-size: 13px; color: var(--c-muted); margin: 4px 0 0; }
  .modal-head .close {
    width: 30px; height: 30px; border-radius: 999px; border: 0;
    background: transparent; color: var(--c-muted); cursor: pointer;
    font-size: 18px; line-height: 1; display: grid; place-items: center;
  }
  .modal-head .close:hover { background: var(--c-bg); color: var(--c-text); }
  .modal-body { padding: 22px 26px 26px; overflow-y: auto; }

  .compare {
    display: grid; grid-template-columns: 1fr 1fr; gap: 24px;
    padding-bottom: 18px; border-bottom: 1px solid var(--c-border);
  }
  .compare-side .label {
    font-size: 11px; color: var(--c-faint); text-transform: uppercase; letter-spacing: .08em; font-weight: 600; margin: 0 0 4px;
  }
  .compare-side .period { font-size: 11px; color: var(--c-muted); margin: 0 0 8px; }
  .compare-side .value { font-family: 'Instrument Serif', Georgia, serif; font-size: 36px; line-height: 1; font-weight: 400; color: var(--c-text); margin: 0 0 10px; letter-spacing: -0.015em; }
  .spark { width: 100%; height: 40px; }

  .verdict {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 16px 0 0;
    font-size: 13px; color: var(--c-muted); line-height: 1.55;
  }
  .verdict b { color: var(--c-text); font-weight: 600; }
  .verdict-icon { width: 16px; height: 16px; flex-shrink: 0; margin-top: 2px; }
  .verdict.green .verdict-icon { color: var(--c-success); }
  .verdict.amber .verdict-icon { color: var(--c-warning); }
  .verdict.red .verdict-icon { color: var(--c-danger); }

  /* breakdown rows in modal */
  .breakdown { padding-top: 18px; }
  .breakdown h4 { font-size: 11px; color: var(--c-faint); text-transform: uppercase; letter-spacing: .08em; font-weight: 600; margin: 0 0 12px; }
  .br-row {
    display: grid; grid-template-columns: 1fr auto auto; gap: 14px; align-items: center;
    padding: 9px 0; border-bottom: 1px dashed var(--c-border); font-size: 13px;
  }
  .br-row:last-child { border-bottom: 0; }
  .br-row .lbl { color: var(--c-text); }
  .br-row .lbl small { display: block; font-size: 11px; color: var(--c-faint); margin-top: 1px; }
  .br-row .val { font-weight: 600; color: var(--c-text); font-variant-numeric: tabular-nums; }

  /* funnel inside modal/list */
  .funnel { display: flex; flex-direction: column; gap: 5px; }
  .fstep { display: grid; grid-template-columns: 1fr auto auto; gap: 12px; align-items: center; font-size: 12px; }
  .fbar { position: relative; height: 18px; background: #f1f5f9; border-radius: 4px; overflow: hidden; }
  .fbar > span {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: linear-gradient(90deg, var(--c-primary), #5fadd8);
    border-radius: 4px;
  }
  .fstep .lbl { color: var(--c-text); font-weight: 500; padding-left: 10px; position: absolute; line-height: 18px; font-size: 11px; color: white; mix-blend-mode: normal; }
  .fstep .val { color: var(--c-text); font-weight: 600; font-variant-numeric: tabular-nums; min-width: 56px; text-align: right; }
  .fstep .conv { color: var(--c-muted); min-width: 50px; text-align: right; font-variant-numeric: tabular-nums; }

  /* Link group */
  .quick-links { display: flex; gap: 8px; padding-top: 18px; }
  .qlink {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 999px;
    background: var(--c-bg); color: var(--c-text);
    font-size: 12px; font-weight: 500;
    text-decoration: none; cursor: pointer;
    border: 1px solid var(--c-border);
  }
  .qlink:hover { background: var(--c-primary-light); color: var(--c-primary); border-color: transparent; }
</style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" data-screen-label="00 Sidebar">
      <div class="brand">
        <img src="assets/igt-logo.png" alt="IGT" />
        <span>IGT</span>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="footer">
        <span class="who">leandro@igtbox.com.br</span>
      </div>
    </aside>
    <main class="main" id="main"></main>
  </div>

  <div class="modal-bg" id="modal-bg"><div class="modal" id="modal"></div></div>

<script>
const NAV = [
  { id: 'posicionamento',   label: 'Posicionamento',   icon: 'pin' },
  { id: 'relacionamento',   label: 'Relacionamento',   icon: 'people' },
  { id: 'prestar-atencao',  label: 'Prestar Atenção',  icon: 'eye' },
  { id: 'eqa',              label: 'EQA',              icon: 'rows' },
  { id: 'convite',          label: 'Convite',          icon: 'spark' },
  { id: 'entrega',          label: 'Entrega Nível A',  icon: 'box' },
  { id: 'ltv',              label: 'LTV',              icon: 'bars' },
];
const ICONS = {
  pin:'<path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/>',
  people:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
  eye:'<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>',
  rows:'<path d="M3 3h18v4H3z"/><path d="M3 9h12v4H3z"/><path d="M3 15h7v4H3z"/>',
  spark:'<path d="M22 12h-4l-3 8-6-16-3 8H2"/>',
  box:'<path d="M12 2L2 7l10 5 10-5-10-5z"/><polyline points="2 12 12 17 22 12"/><polyline points="2 17 12 22 22 17"/>',
  bars:'<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>',
  yt:'<svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M23.495 6.205a3.007 3.007 0 0 0-2.088-2.088c-1.87-.501-9.396-.501-9.396-.501s-7.507-.01-9.396.501A3.007 3.007 0 0 0 .527 6.205a31 31 0 0 0-.522 5.805 31 31 0 0 0 .522 5.783 3 3 0 0 0 2.088 2.088c1.868.502 9.396.502 9.396.502s7.506 0 9.396-.502a3 3 0 0 0 2.088-2.088 31 31 0 0 0 .5-5.783 31 31 0 0 0-.5-5.805zM9.609 15.601V8.408l6.264 3.602z"/></svg>',
  ig:'<svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M12 2.16c3.2 0 3.58.01 4.85.07 3.25.15 4.77 1.7 4.92 4.92.06 1.27.07 1.65.07 4.85 0 3.2-.01 3.58-.07 4.85-.15 3.22-1.66 4.77-4.92 4.92-1.27.06-1.64.07-4.85.07-3.2 0-3.58-.01-4.85-.07-3.26-.15-4.77-1.7-4.92-4.92-.06-1.27-.07-1.64-.07-4.85 0-3.2.01-3.58.07-4.85.15-3.23 1.66-4.77 4.92-4.92 1.27-.06 1.65-.07 4.85-.07zm0-2.16C8.74 0 8.33.01 7.05.07 2.7.27.27 2.69.07 7.05.01 8.33 0 8.74 0 12s.01 3.67.07 4.95c.2 4.36 2.62 6.78 6.98 6.98 1.28.06 1.69.07 4.95.07s3.67-.01 4.95-.07c4.35-.2 6.78-2.62 6.98-6.98.06-1.28.07-1.69.07-4.95s-.01-3.67-.07-4.95c-.2-4.35-2.62-6.78-6.98-6.98C15.67.01 15.26 0 12 0zm0 5.84a6.16 6.16 0 1 0 0 12.32 6.16 6.16 0 0 0 0-12.32zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.4-11.85a1.44 1.44 0 1 0 0 2.88 1.44 1.44 0 0 0 0-2.88z"/></svg>',
};
function svg(name) { return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]}</svg>`; }
function svgNav(name) { return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]}</svg>`; }

let activeTab = 'posicionamento';

function renderNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = NAV.map(n => `<a class="${n.id===activeTab?'active':''}" data-tab="${n.id}">${svgNav(n.icon)}<span>${n.label}</span></a>`).join('');
  nav.querySelectorAll('a').forEach(a => a.addEventListener('click', () => { activeTab = a.dataset.tab; renderNav(); renderMain(); window.scrollTo(0,0); }));
}

/* sparkline */
function sparkline(values, color, opts = {}) {
  if (!values || values.length < 2) return '';
  const w = opts.w || 240, h = opts.h || 40, pad = 3;
  const min = Math.min(...values), max = Math.max(...values);
  const range = max - min || 1;
  const step = (w - pad * 2) / (values.length - 1);
  const pts = values.map((v, i) => [pad + i * step, h - pad - ((v - min) / range) * (h - pad * 2)]);
  const d = pts.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
  const area = `M${pts[0][0]},${h} ${pts.map(p => 'L' + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ')} L${pts[pts.length-1][0]},${h} Z`;
  const last = pts[pts.length-1];
  const id = 'g' + Math.random().toString(36).slice(2,7);
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs><linearGradient id="${id}" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity=".18"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#${id})"/>
    <path d="${d}" stroke="${color}" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="2.5" fill="${color}" stroke="white" stroke-width="1.2"/>
  </svg>`;
}

function gen(n, min, max, drift = 0.5, seed = 1) {
  let s = seed; const rand = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
  const out = []; let v = (min + max) / 2;
  for (let i = 0; i < n; i++) {
    v += (rand() - 0.5) * (max - min) * 0.15 + (drift - 0.5) * (max - min) * 0.025;
    v = Math.max(min, Math.min(max, v));
    out.push(Math.round(v));
  }
  return out;
}

function fmtNum(n, opts = {}) {
  if (n >= 1000000) return (n/1000000).toFixed(1).replace('.', ',') + 'M';
  if (n >= 10000) return (n/1000).toFixed(0) + 'k';
  if (n >= 1000 && opts.full) return n.toLocaleString('pt-BR');
  if (n >= 1000) return (n/1000).toFixed(1).replace('.', ',') + 'k';
  return n.toLocaleString('pt-BR');
}

function pct(curr, prev) { if (!prev) return 0; return ((curr - prev) / prev) * 100; }
function deltaTxt(p) {
  if (Math.abs(p) < 0.05) return `<span class="delta flat">—</span>`;
  const cls = p > 0 ? 'up' : 'down';
  const arrow = p > 0 ? '↑' : '↓';
  return `<span class="delta ${cls}">${arrow} ${Math.abs(p).toFixed(1).replace('.', ',')}%</span>`;
}

function statusFor(p, opts = {}) {
  // p = % change. opts.invert (true means lower is better, e.g. CPL/churn)
  const v = opts.invert ? -p : p;
  if (v >= 0) return 'green';
  if (v >= -8) return 'amber';
  return 'red';
}

/* =======================================================================
   DATA — single source of truth per tab
======================================================================= */
const DATA = {
  posicionamento: {
    title: 'Posicionamento',
    sub: 'O quanto a marca está sendo encontrada nas redes',
    range: '09 mar — 07 mai · vs. 30 dias anteriores',
    hasDate: true,
    kpis: [
      { id:'yt-subs', icon:'yt', title:'Inscritos no YouTube', value:187930, prev:184220, format:'full',
        sparkPrev: gen(30, 183500, 186400, 0.62, 11), sparkCurr: gen(30, 186300, 188000, 0.7, 22),
        breakdown:[
          { lbl:'Ganhos no período', help:'novos inscritos', val:'+4.310' },

/* =======================================================================
   FORMAT VALUE
======================================================================= */
function fmtKpi(k) {
  const v = k.value;
  switch (k.format) {
    case 'full':   return v.toLocaleString('pt-BR');
    case 'compact':return fmtNum(v);
    case 'pct0':   return Math.round(v).toString();
    case 'pct1':   return v.toFixed(1).replace('.', ',');
    case 'pct2':   return v.toFixed(2).replace('.', ',');
    case 'rs':     return 'R$ ' + Math.round(v).toLocaleString('pt-BR');
    case 'rsk':    return 'R$ ' + (v >= 1000 ? (v/1000).toFixed(1).replace('.', ',') + 'k' : v.toLocaleString('pt-BR'));
    case 'plain':
    default:       return v.toLocaleString('pt-BR');
  }
}

/* =======================================================================
   PULSE STRINGS
======================================================================= */
function buildPulse(tab, kpis) {
  const statuses = kpis.map(k => statusFor(pct(k.value, k.prev), { invert: !!k.invert }));
  const greens = statuses.filter(s => s === 'green').length;
  const ambers = statuses.filter(s => s === 'amber').length;
  const reds   = statuses.filter(s => s === 'red').length;
  const dot = reds ? 'red' : ambers ? 'amber' : 'green';
  let text;
  if (reds) text = `<b>${reds} indicador${reds>1?'es':''} crítico${reds>1?'s':''}</b> e ${ambers} em atenção. Comece pelos vermelhos.`;
  else if (ambers) text = `<b>${ambers} ponto${ambers>1?'s':''} de atenção</b>, nada crítico. ${greens} no verde.`;
  else text = `<b>Tudo no verde</b> — todos os ${greens} indicadores deste módulo respirando bem.`;
  return `<span class="pulse-dot ${dot}"></span><span class="pulse-text">${text}</span><span class="pulse-meta">${DATA[tab].range}</span>`;
}

/* =======================================================================
   RENDER
======================================================================= */
function renderMain() {
  const main = document.getElementById('main');
  const data = DATA[activeTab];
  if (!data) { main.innerHTML = ''; return; }

  const dateCtrl = data.hasDate ? `
    <div class="controls">
      <button class="ctrl">7 dias</button>
      <button class="ctrl active">30 dias</button>
      <button class="ctrl">90 dias</button>
      <span class="date-range">09/03 – 07/05</span>
    </div>` : '';

  const idx = NAV.findIndex(n => n.id === activeTab);
  const label = `${String(idx + 1).padStart(2, '0')} ${NAV[idx].label}`;

  main.innerHTML = `
    <div data-screen-label="${label}">
      <div class="header">
        <div class="left">
          <h1>${data.title}</h1>
          <p class="sub">${data.sub}</p>
        </div>
        ${dateCtrl}
      </div>

      <div class="pulse">${buildPulse(activeTab, data.kpis)}</div>

      <div class="section">
        <div class="grid grid-4">
          ${data.kpis.map(k => kpiCard(k)).join('')}
        </div>
      </div>
    </div>
  `;

  main.querySelectorAll('.kpi').forEach(el => {
    el.addEventListener('click', () => openModal(el.dataset.id));
  });
}

function kpiCard(k) {
  const p = pct(k.value, k.prev);
  const s = statusFor(p, { invert: !!k.invert });
  return `
    <div class="kpi ${s}" data-id="${k.id}">
      <div class="kpi-head">
        <span class="kpi-icon ${k.icon}">${ICONS[k.icon] && (k.icon==='yt'||k.icon==='ig') ? ICONS[k.icon] : svg(k.icon)}</span>
        <p class="kpi-title">${k.title}</p>
        <span class="kpi-status ${s}"></span>
      </div>
      <div class="kpi-value num">${fmtKpi(k)}${k.suffix ? `<span class="unit">${k.suffix}</span>` : ''}</div>
      <div class="kpi-foot">
        <span>${k.secondary || (k.target ? 'meta ' + k.target : 'vs. anterior')}</span>
        ${deltaTxt(p)}
      </div>
    </div>
  `;
}

   MODAL
======================================================================= */
function openModal(id) {
  const k = DATA[activeTab].kpis.find(x => x.id === id);
  if (!k) return;
  const p = pct(k.value, k.prev);
  const s = statusFor(p, { invert: !!k.invert });

  // Build comparison or funnel
  let detail = '';
  if (k.funnel) {
    detail = `
      <div class="breakdown" style="padding-top:0;">
        <h4>Etapas do funil</h4>
        <div class="funnel">
          ${k.funnel.map(f => `
            <div class="fstep" style="position:relative;">
              <div class="fbar"><span style="width:${f.conv}%"></span><span class="lbl">${f.lbl}</span></div>
              <span class="val num">${f.val.toLocaleString('pt-BR')}</span>

        </div>

    const colorCurr = s === 'green' ? '#16a34a' : s === 'amber' ? '#d97706' : '#dc2626';
    const prevTotal = k.format === 'compact' ? fmtNum(k.prev) : (k.format === 'rs' || k.format === 'rsk') ? 'R$ ' + (k.prev >= 1000 ? (k.prev/1000).toFixed(1).replace('.',',') + 'k' : k.prev.toLocaleString('pt-BR')) : k.prev.toLocaleString('pt-BR');
    const currTotal = k.format === 'compact' ? fmtNum(k.value) : (k.format === 'rs' || k.format === 'rsk') ? 'R$ ' + (k.value >= 1000 ? (k.value/1000).toFixed(1).replace('.',',') + 'k' : k.value.toLocaleString('pt-BR')) : k.value.toLocaleString('pt-BR');
    detail = `
      <div class="compare">
        <div class="compare-side">
          <p class="label">Período anterior</p>
          <p class="period">07/02 – 08/03</p>
          <p class="value num">${prevTotal}</p>
          ${sparkline(k.sparkPrev, '#94a3b8', { h: 40, w: 280 })}
        </div>
        <div class="compare-side">
          <p class="label" style="color:${colorCurr};">Período atual</p>
          <p class="period">09/03 – 07/05</p>
          <p class="value num">${currTotal}</p>
          ${sparkline(k.sparkCurr, colorCurr, { h: 40, w: 280 })}
        </div>

  const verdictText = s === 'green'
    ? `<b>${k.title} ${p >= 0 ? 'cresceu' : 'caiu'} ${Math.abs(p).toFixed(1).replace('.', ',')}%</b> em relação ao período anterior. ${k.invert ? 'Eficiência melhorando.' : 'Direção desejada.'}`
    : s === 'amber'
    ? `<b>${k.title} variou ${Math.abs(p).toFixed(1).replace('.', ',')}%</b> em relação ao período anterior. Bem perto do limite — vale acompanhar.`
    : `<b>${k.title} ${p >= 0 ? 'subiu' : 'caiu'} ${Math.abs(p).toFixed(1).replace('.', ',')}%</b> em relação ao período anterior. Pede ação.`;

  const verdictIcon = s === 'green'
    ? '<svg class="verdict-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
    : s === 'amber'
    ? '<svg class="verdict-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
    : '<svg class="verdict-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>';

  const breakdown = k.breakdown ? `
    <div class="breakdown">
      <h4>Detalhe</h4>
      ${k.breakdown.map(b => `
        <div class="br-row">
          <span class="lbl">${b.lbl}${b.help ? `<small>${b.help}</small>`:''}</span>
          <span class="val">${b.val}</span>
        </div>
      `).join('')}
    </div>` : '';

  document.getElementById('modal').innerHTML = `
    <div class="modal-head">
      <div style="flex:1;min-width:0;">
        <h3>${k.title}</h3>
        <p class="sub">${k.secondary || (k.target ? 'Meta: ' + k.target : 'Detalhe e comparação com o período anterior')}</p>
      </div>
      <button class="close" id="close-modal">×</button>
    </div>
    <div class="modal-body">
      ${detail}
      <div class="verdict ${s}">${verdictIcon}<div>${verdictText}</div></div>
      ${breakdown}
      <div class="quick-links">
        <a class="qlink" href="#">Abrir histórico completo →</a>
        <a class="qlink" href="#">Ver dados brutos</a>
      </div>
    </div>
  `;
  document.getElementById('modal-bg').classList.add('open');
  document.getElementById('close-modal').addEventListener('click', closeModal);
}
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }
document.getElementById('modal-bg').addEventListener('click', e => { if (e.target.id === 'modal-bg') closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

renderNav();
renderMain();
</script>
</body>
</html>
