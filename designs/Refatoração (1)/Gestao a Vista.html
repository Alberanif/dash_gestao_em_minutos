<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Painel IGT — Gestão em 4 Minutos</title>
<meta name="viewport" content="width=1440" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --color-primary: #3b93c3;
    --color-primary-dark: #2e7aa8;
    --color-primary-light: #ebf5fb;
    --color-accent: #f5a623;
    --color-bg: #f1f5f9;
    --color-surface: #ffffff;
    --color-border: #e2e8f0;
    --color-border-strong: #cbd5e1;
    --color-text: #1e293b;
    --color-text-muted: #64748b;
    --color-text-faint: #94a3b8;
    --color-success: #16a34a;
    --color-success-bg: #ecfdf5;
    --color-success-border: #a7f3d0;
    --color-danger: #dc2626;
    --color-danger-bg: #fef2f2;
    --color-danger-border: #fecaca;
    --color-warning: #f5a623;
    --color-warning-bg: #fffbeb;
    --color-warning-border: #fde68a;
    --radius-sm: 8px;
    --radius-card: 12px;
    --radius-lg: 16px;
    --shadow-card: 0 1px 3px rgba(15, 23, 42, .07), 0 1px 2px rgba(15, 23, 42, .04);
    --shadow-md: 0 4px 14px rgba(15, 23, 42, .08), 0 2px 4px rgba(15, 23, 42, .04);
    --shadow-pop: 0 12px 32px rgba(15, 23, 42, .12);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--color-bg);
    color: var(--color-text);
    font-feature-settings: 'cv11','ss01','ss03';
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    font-size: 14px;
  }
  .num { font-variant-numeric: tabular-nums; letter-spacing: -0.02em; font-feature-settings: 'tnum','ss01'; }
  .mono { font-family: 'JetBrains Mono', monospace; }

  /* ---------- SHELL ---------- */
  .app { display: flex; min-height: 100vh; }
  .sidebar {
    width: 220px; flex-shrink: 0;
    background: var(--color-surface);
    border-right: 1px solid var(--color-border);
    display: flex; flex-direction: column;
    position: sticky; top: 0; height: 100vh;
  }
  .sidebar-brand {
    height: 56px; background: var(--color-primary);
    display: flex; align-items: center; gap: 12px; padding: 0 16px;
  }
  .sidebar-brand img { width: 28px; height: 28px; }
  .sidebar-brand span { color: white; font-weight: 600; font-size: 13px; letter-spacing: .08em; }
  .sidebar-nav { flex: 1; overflow-y: auto; padding: 16px 0; display: flex; flex-direction: column; gap: 2px; }
  .nav-link {
    display: flex; align-items: center; gap: 12px;
    padding: 9px 16px 9px 13px; margin-right: 0;
    color: var(--color-text-muted); font-size: 14px; font-weight: 500;
    text-decoration: none; cursor: pointer;
    border-left: 3px solid transparent;
    transition: background-color 120ms, color 120ms;
  }
  .nav-link:hover { background: #f8fafc; color: var(--color-text); }
  .nav-link.active {
    background: var(--color-primary-light);
    color: var(--color-primary);
    border-left-color: var(--color-primary);
  }
  .nav-link svg { width: 18px; height: 18px; flex-shrink: 0; }
  .sidebar-footer {
    border-top: 1px solid var(--color-border);
    padding: 14px 16px; display: flex; align-items: center; gap: 8px;
    color: var(--color-text-muted); font-size: 13px;
  }
  .sidebar-footer .who { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .icon-btn {
    width: 32px; height: 32px; border-radius: 999px; border: 0; background: transparent;
    color: var(--color-text-muted); cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
  }
  .icon-btn:hover { background: #f1f5f9; color: var(--color-text); }

  .main { flex: 1; min-width: 0; }

  /* ---------- PAGE HEADER ---------- */
  .page-header {
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border);
    padding: 18px 28px;
    display: flex; align-items: center; gap: 18px;
  }
  .page-title-block { flex: 1; min-width: 0; }
  .page-eyebrow {
    font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
    color: var(--color-text-faint); margin: 0 0 2px;
  }
  .page-title { font-size: 22px; font-weight: 600; color: var(--color-text); margin: 0; letter-spacing: -0.015em; }
  .page-sub { margin: 4px 0 0; font-size: 13px; color: var(--color-text-muted); }

  .date-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .quick-pill {
    border: 1px solid var(--color-border); background: var(--color-surface);
    color: var(--color-text-muted);
    border-radius: 999px; padding: 6px 12px; font-size: 12px; font-weight: 500; cursor: pointer;
  }
  .quick-pill.active { background: var(--color-primary); color: white; border-color: var(--color-primary); }
  .date-input {
    border: 1px solid var(--color-border); background: var(--color-surface);
    border-radius: 8px; padding: 6px 10px; font-size: 13px; color: var(--color-text);
    font-family: inherit;
  }

  /* ---------- PULSE BANNER (per-tab status header) ---------- */
  .pulse-banner {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 14px;
    padding: 18px 22px;
    display: flex; align-items: center; gap: 18px;
    box-shadow: var(--shadow-card);
    position: relative; overflow: hidden;
  }
  .pulse-banner::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    background: var(--pulse-color, var(--color-success));
  }
  .pulse-icon {
    width: 52px; height: 52px; flex-shrink: 0;
    border-radius: 14px; display: grid; place-items: center;
    background: var(--pulse-bg, var(--color-success-bg));
    color: var(--pulse-color, var(--color-success));
  }
  .pulse-text { flex: 1; min-width: 0; }
  .pulse-h {
    font-size: 16px; font-weight: 600; color: var(--color-text); margin: 0 0 2px;
    letter-spacing: -0.01em;
  }
  .pulse-sub { font-size: 13px; color: var(--color-text-muted); margin: 0; }
  .pulse-summary { display: flex; gap: 10px; flex-shrink: 0; }
  .pulse-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 999px;
    font-size: 12px; font-weight: 600; color: var(--color-text);
    background: var(--color-bg); border: 1px solid var(--color-border);
  }
  .pulse-chip .dot { width: 8px; height: 8px; border-radius: 999px; }
  .pulse-chip.green .dot { background: var(--color-success); }
  .pulse-chip.amber .dot { background: var(--color-warning); }
  .pulse-chip.red   .dot { background: var(--color-danger); }
  .pulse-chip.muted { color: var(--color-text-muted); }

  /* ---------- COMMON CARDS ---------- */
  .section { padding: 24px 28px 32px; display: flex; flex-direction: column; gap: 20px; }
  .section-title {
    display: flex; align-items: center; gap: 10px; margin: 4px 0 0;
  }
  .section-title h2 { font-size: 12px; font-weight: 600; color: var(--color-text-muted); margin: 0; letter-spacing: .06em; text-transform: uppercase; }
  .section-title .bar { width: 3px; height: 16px; background: var(--color-primary); border-radius: 2px; }
  .section-title .count {
    font-size: 12px; font-weight: 600; color: var(--color-text-muted);
    background: var(--color-bg); border: 1px solid var(--color-border);
    border-radius: 999px; padding: 2px 10px;
  }
  .section-title .helper { color: var(--color-text-muted); font-size: 12px; font-weight: 500; }

  .grid { display: grid; gap: 16px; }
  .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }

  /* Status card — the workhorse component */
  .stat-card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-card);
    padding: 16px 18px;
    box-shadow: var(--shadow-card);
    display: flex; flex-direction: column; gap: 10px;
    position: relative;
    transition: box-shadow 150ms, transform 150ms;
    cursor: pointer;
  }
  .stat-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .stat-card.green { border-left: 2px solid var(--color-success); }
  .stat-card.amber { border-left: 2px solid var(--color-warning); }
  .stat-card.red   { border-left: 2px solid var(--color-danger); }
  .stat-card .corner-status {
    position: absolute; top: 14px; right: 14px;
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 9px; border-radius: 999px;
    font-size: 11px; font-weight: 600; line-height: 1;
  }
  .corner-status.green { color: #15803d; background: #f0fdf4; border: 1px solid #bbf7d0; }
  .corner-status.amber { color: #92400e; background: #fffbeb; border: 1px solid #fde68a; }
  .corner-status.red   { color: #991b1b; background: #fef2f2; border: 1px solid #fecaca; }
  .corner-status .dot { width: 6px; height: 6px; border-radius: 999px; }
  .corner-status.green .dot { background: var(--color-success); }
  .corner-status.amber .dot { background: var(--color-warning); }
  .corner-status.red .dot   { background: var(--color-danger); animation: pulseDot 1.6s ease-in-out infinite; }
  @keyframes pulseDot {
    0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,.45); }
    50% { box-shadow: 0 0 0 5px rgba(220,38,38,0); }
  }

  .stat-head { display: flex; align-items: center; gap: 10px; padding-right: 72px; }
  .stat-iconbox {
    width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0;
    display: grid; place-items: center;
    background: var(--color-primary-light); color: var(--color-primary);
  }
  .stat-iconbox.yt { background: #fef2f2; color: #dc2626; }
  .stat-iconbox.ig { background: #fdf2f8; color: #be185d; }
  .stat-title { font-size: 12px; font-weight: 600; color: var(--color-text-muted); margin: 0; }
  .stat-help  { font-size: 11px; color: var(--color-text-faint); margin: 1px 0 0; }

  .stat-value { font-size: 28px; font-weight: 600; color: var(--color-text); line-height: 1; letter-spacing: -0.025em; }
  .stat-value .unit { font-size: 14px; font-weight: 500; color: var(--color-text-muted); margin-left: 3px; letter-spacing: 0; }

  .stat-meta {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding-top: 10px; border-top: 1px dashed var(--color-border);
  }
  .delta {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 12px; font-weight: 600;
    padding: 3px 8px; border-radius: 6px;
  }
  .delta.up   { color: #15803d; background: #dcfce7; }
  .delta.down { color: #991b1b; background: #fee2e2; }
  .delta.flat { color: var(--color-text-muted); background: var(--color-bg); }
  .delta svg { width: 11px; height: 11px; }

  .stat-foot { font-size: 11px; color: var(--color-text-muted); }
  .stat-foot strong { color: var(--color-text); font-weight: 600; }

  /* sparkline holder */
  .spark { width: 100%; height: 36px; }

  /* ---------- TIPS / EXPLAINERS ---------- */
  .tip {
    display: flex; align-items: flex-start; gap: 10px;
    background: #fafbfc; border: 1px dashed var(--color-border);
    border-radius: 10px; padding: 10px 12px;
    font-size: 12px; color: var(--color-text-muted); line-height: 1.5;
  }
  .tip svg { width: 14px; height: 14px; flex-shrink: 0; margin-top: 2px; color: var(--color-primary); }
  .tip b { color: var(--color-text); font-weight: 600; }

  /* ---------- BIG COMPARISON CARD (atual vs anterior) ---------- */
  .compare-card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-card);
    overflow: hidden;
  }
  .compare-card.green { border-left: 2px solid var(--color-success); }
  .compare-card.amber { border-left: 2px solid var(--color-warning); }
  .compare-card.red   { border-left: 2px solid var(--color-danger); }
  .compare-head {
    display: flex; align-items: center; gap: 12px; padding: 16px 20px;
    border-bottom: 1px solid var(--color-border);
  }
  .compare-head .platform {
    width: 36px; height: 36px; border-radius: 10px;
    display: grid; place-items: center; flex-shrink: 0;
  }
  .compare-head .platform.yt { background: #fee2e2; color: #dc2626; }
  .compare-head .platform.ig { background: linear-gradient(135deg, #fdf2f8, #f3e8ff); color: #be185d; }
  .compare-head h3 { font-size: 15px; font-weight: 700; margin: 0; color: var(--color-text); }
  .compare-head .metric-label { margin-left: auto; font-size: 12px; color: var(--color-text-muted); font-weight: 500; }

  .compare-body { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
  .compare-side { padding: 18px 20px; border-right: 1px dashed var(--color-border); }
  .compare-side:last-child { border-right: 0; }
  .compare-side.current { background: var(--color-surface); }
  .compare-tag {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
    padding: 3px 8px; border-radius: 4px;
  }
  .compare-tag.previous { background: var(--color-bg); color: var(--color-text-muted); }
  .compare-tag.current  { background: rgba(59,147,195,.12); color: var(--color-primary); }
  .compare-tag.current.green { background: rgba(22,163,74,.12); color: var(--color-success); }
  .compare-tag.current.red   { background: rgba(220,38,38,.12); color: var(--color-danger); }

  .compare-period { font-size: 11px; color: var(--color-text-muted); margin-top: 6px; }
  .compare-num {
    font-size: 30px; font-weight: 700; letter-spacing: -0.025em;
    color: var(--color-text); margin: 8px 0 10px; line-height: 1;
  }
  .compare-spark { height: 44px; width: 100%; }

  .compare-footer {
    border-top: 1px solid var(--color-border);
    padding: 12px 20px;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px;
    background: #fbfdff;
  }
  .compare-footer .verdict { display: flex; align-items: center; gap: 8px; }
  .compare-footer .verdict svg { width: 16px; height: 16px; }
  .compare-footer .verdict.green { color: var(--color-success); }
  .compare-footer .verdict.amber { color: #b45309; }
  .compare-footer .verdict.red { color: var(--color-danger); }
  .compare-footer .verdict b { color: var(--color-text); font-weight: 600; }
  .compare-footer .explore {
    color: var(--color-primary); font-weight: 600; text-decoration: none;
    display: inline-flex; align-items: center; gap: 4px;
  }

  /* ---------- LIST CARDS / FUNNELS ---------- */
  .list-card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-card);
    padding: 18px;
    box-shadow: var(--shadow-card);
    display: flex; flex-direction: column; gap: 14px;
  }
  .list-card .lc-head { display: flex; align-items: center; gap: 10px; }
  .list-card .lc-name { font-size: 14px; font-weight: 700; color: var(--color-text); margin: 0; flex: 1; }
  .list-card .lc-period { font-size: 11px; color: var(--color-text-muted); }

  .funnel { display: flex; flex-direction: column; gap: 4px; }
  .funnel-step {
    display: grid; grid-template-columns: 1fr auto auto; align-items: center; gap: 10px;
    font-size: 12px;
  }
  .funnel-bar-wrap { position: relative; height: 22px; background: var(--color-bg); border-radius: 6px; overflow: hidden; }
  .funnel-bar {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: linear-gradient(90deg, var(--color-primary), #4ea4d3);
    border-radius: 6px;
    display: flex; align-items: center; padding-left: 10px;
    color: white; font-weight: 600; font-size: 11px;
  }
  .funnel-bar.muted { background: linear-gradient(90deg, #94a3b8, #cbd5e1); }
  .funnel-step .label { color: var(--color-text); font-weight: 500; }
  .funnel-step .value { color: var(--color-text); font-weight: 700; min-width: 56px; text-align: right; }
  .funnel-step .conv { color: var(--color-text-muted); min-width: 56px; text-align: right; font-weight: 500; }

  /* horizontal score bar */
  .scorebar {
    height: 8px; border-radius: 999px; background: var(--color-bg); overflow: hidden;
    position: relative;
  }
  .scorebar > span {
    position: absolute; left: 0; top: 0; bottom: 0; border-radius: 999px;
    background: var(--score-color, var(--color-primary));
  }

  /* ---------- HEALTH METER (attention page) ---------- */
  .health-row {
    display: grid; grid-template-columns: 32px 1fr auto auto; gap: 12px; align-items: center;
    padding: 10px 0; border-bottom: 1px dashed var(--color-border);
  }
  .health-row:last-child { border-bottom: 0; }
  .health-icon { width: 28px; height: 28px; border-radius: 8px; display: grid; place-items: center; }
  .health-icon.yt { background: #fee2e2; color: #dc2626; }
  .health-icon.ig { background: #fce7f3; color: #be185d; }
  .health-label { font-size: 13px; font-weight: 500; color: var(--color-text); }
  .health-label small { display: block; font-size: 11px; color: var(--color-text-muted); font-weight: 400; margin-top: 1px; }
  .health-num { font-size: 14px; font-weight: 700; color: var(--color-text); }

  /* ---------- COCKPIT BAND (attention page) ---------- */
  .cockpit-band {
    display: grid; grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 16px;
  }
  .cockpit-tile {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 14px;
    padding: 16px 18px;
    display: flex; flex-direction: column; gap: 10px;
    box-shadow: var(--shadow-card);
  }
  .cockpit-tile.green { border-left: 2px solid var(--color-success); }
  .cockpit-tile.amber { border-left: 2px solid var(--color-warning); }
  .cockpit-tile.red   { border-left: 2px solid var(--color-danger); }
  .cockpit-tile h4 { font-size: 11px; font-weight: 600; color: var(--color-text-muted); margin: 0; text-transform: uppercase; letter-spacing: .08em; }
  .cockpit-tile .big { font-size: 24px; font-weight: 600; color: var(--color-text); letter-spacing: -0.02em; line-height: 1; }
  .cockpit-tile .row { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--color-text-muted); }
  .cockpit-tile .row b { color: var(--color-text); font-weight: 600; }

  /* ---------- TAB ROUTER ---------- */
  .tab { display: none; }
  .tab.active { display: block; }

  /* utilities */
  .row { display: flex; align-items: center; gap: 12px; }
  .gap-8 { gap: 8px; }
  .gap-16 { gap: 16px; }
  .col { display: flex; flex-direction: column; }
  .muted { color: var(--color-text-muted); }
  .small { font-size: 12px; }
  .xsmall { font-size: 11px; }

  /* progress ring SVG container */
  .ring { position: relative; width: 96px; height: 96px; flex-shrink: 0; }
  .ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring .ring-text {
    position: absolute; inset: 0; display: grid; place-items: center;
    font-size: 18px; font-weight: 700; color: var(--color-text);
  }

  /* clickable card hover */
  .clickable { cursor: pointer; }
  .clickable:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }

  /* tabs underline (sub-section selector) */
  .subnav { display: flex; gap: 4px; padding: 0 28px; border-bottom: 1px solid var(--color-border); background: var(--color-surface); }
  .subnav button {
    background: transparent; border: 0; padding: 12px 16px;
    font-size: 13px; font-weight: 500; color: var(--color-text-muted);
    cursor: pointer; border-bottom: 2px solid transparent;
  }
  .subnav button.active { color: var(--color-primary); border-bottom-color: var(--color-primary); font-weight: 600; }

</style>
</head>
<body>
  <div class="app">
    <!-- SIDEBAR -->
    <aside class="sidebar" data-screen-label="00 Sidebar">
      <div class="sidebar-brand">
        <img src="assets/igt-logo.png" alt="IGT" />
        <span>IGT</span>
      </div>
      <nav class="sidebar-nav" id="nav"></nav>
      <div class="sidebar-footer">
        <span class="who">leandro@igtbox.com.br</span>
        <button class="icon-btn" title="Sair">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        </button>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main" id="main"></main>
  </div>

<script>
/* =======================================================================
   NAV CONFIG
======================================================================= */
const NAV = [
  { id: 'posicionamento',   label: 'Posicionamento',   icon: 'pin' },
  { id: 'relacionamento',   label: 'Relacionamento',   icon: 'people' },
  { id: 'prestar-atencao',  label: 'Prestar Atenção',  icon: 'eye' },
  { id: 'eqa',              label: 'EQA',              icon: 'rows' },
  { id: 'convite',          label: 'Convite',          icon: 'spark' },
  { id: 'entrega',          label: 'Entrega Nível A',  icon: 'box' },
  { id: 'ltv',              label: 'LTV',              icon: 'bars' },
];

const ICONS = {
  pin:   '<path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/>',

function pageHeader({ eyebrow, title, sub, actions }) {

function dateControls({ active = '30' } = {}) {
  const opts = ['7', '15', '30'];
  return `
    ${opts.map(o => `<button class="quick-pill ${o === active ? 'active' : ''}">${o} dias</button>`).join('')}
    <input class="date-input" type="text" value="09/03/2026" readonly />

    <button class="quick-pill" style="background:var(--color-primary);color:white;border-color:var(--color-primary);">Aplicar</button>
  `;
}

/* sparkline path generator — input array of numbers, returns <svg> */
function sparkline(values, color, opts = {}) {
  if (!values || values.length < 2) return '';
  const w = opts.w || 200, h = opts.h || 44, pad = 2;
  const min = Math.min(...values), max = Math.max(...values);
  const range = max - min || 1;
  const step = (w - pad * 2) / (values.length - 1);
  const pts = values.map((v, i) => [pad + i * step, h - pad - ((v - min) / range) * (h - pad * 2)]);
  const d = pts.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
  const area = `M${pts[0][0]},${h} ${pts.map(p => 'L' + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ')} L${pts[pts.length-1][0]},${h} Z`;
  const lastPt = pts[pts.length-1];
  return `
    <svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="g-${opts.id || Math.random().toString(36).slice(2,6)}" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="${color}" stop-opacity=".22"/>
          <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="${area}" fill="url(#g-${opts.id || ''})"/>
      <path d="${d}" stroke="${color}" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${lastPt[0].toFixed(1)}" cy="${lastPt[1].toFixed(1)}" r="3" fill="${color}" stroke="white" stroke-width="1.5"/>
    </svg>
  `;
}

/* delta pill */
function delta(pct, opts = {}) {
  const isUp = pct > 0;
  const isDown = pct < 0;
  const cls = pct === 0 ? 'flat' : (isUp ? (opts.invert ? 'down' : 'up') : (opts.invert ? 'up' : 'down'));
  const arrow = pct === 0
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="5" y1="12" x2="19" y2="12"/></svg>'
    : (isUp
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="6 14 12 8 18 14"/></svg>'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="6 10 12 16 18 10"/></svg>');
  const sign = pct > 0 ? '+' : '';
  return `<span class="delta ${cls}">${arrow}${sign}${pct.toFixed(1)}%</span>`;
}

/* status: 'green' | 'amber' | 'red' */
function statusChip(status, label) {
  const map = { green: 'No verde', amber: 'Atenção', red: 'Crítico' };
  return `<span class="corner-status ${status}"><span class="dot"></span>${label || map[status]}</span>`;
}

/* compute status from a target % */
function statusFor(currentPct) {
  if (currentPct >= 0) return 'green';
  if (currentPct >= -10) return 'amber';
  return 'red';
}

  const out = [];
  let v = (min + max) / 2;
  for (let i = 0; i < n; i++) {
    const r = (Math.random() - 0.5) * (max - min) * 0.15;
    v = v + r + (drift - 0.5) * (max - min) * 0.02;
    v = Math.max(min, Math.min(max, v));
    out.push(Math.round(v));
  }
  return out;
}

function statCard({ icon, title, help, value, unit, delta: d, status, foot, sparkData }) {
  return `
    <div class="stat-card ${status || ''}">
      ${status ? statusChip(status) : ''}
      <div class="stat-head">
        <div class="stat-iconbox">${icon}</div>
        <div>

          ${help ? `<p class="stat-help">${help}</p>` : ''}
        </div>
      </div>
      <div class="stat-value num">${value}${unit ? `<span class="unit">${unit}</span>` : ''}</div>
      ${sparkData ? sparkline(sparkData, status === 'red' ? '#ef4444' : status === 'amber' ? '#f59e0b' : '#22c55e', { h: 36 }) : ''}
      <div class="stat-meta">
        ${typeof d === 'number' ? delta(d) : '<span class="muted small">—</span>'}
        <span class="stat-foot">${foot || ''}</span>
      </div>
    </div>
  `;
}
</script>

}

<script>

function renderMain() {
  const main = document.getElementById('main');
  const map = {
    'posicionamento':  renderPosicionamento,
    'relacionamento':  renderRelacionamento,
    'prestar-atencao': renderPrestarAtencao,
    'eqa':             renderEQA,
    'convite':         renderConvite,
    'entrega':         renderEntrega,
    'ltv':             renderLTV,
  };
  const fn = map[activeTab] || renderPosicionamento;
  main.innerHTML = `<div class="tab active" data-screen-label="${getLabel(activeTab)}">${fn()}</div>`;
}

function getLabel(id) {
  const idx = NAV.findIndex(n => n.id === id);
  return `${String(idx + 1).padStart(2, '0')} ${NAV[idx].label}`;
}

renderNav();
renderMain();
</script>
